<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPGANG | Old money Lab</title>
    <style>
        :root {
            --brand-navy: #001f3f;
            --preview-bg: #FAF9F6;
        }
        body {
            font-family: 'Times New Roman', serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: #fff;
        }

       
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            gap: 20px;
            border-right: 1px solid #eee;
        }
        .header-box { text-align: center; margin-bottom: 40px; }
        .back-btn { text-decoration: none; color: #777; font-size: 14px; font-weight: bold; margin-bottom: 20px; display: inline-block; }

        .slider-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fdfdfd;
            padding: 25px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .arrow { background: none; border: none; font-size: 35px; cursor: pointer; color: var(--brand-navy); }
        .item-label { text-align: center; }
        .cat-name { font-size: 10px; text-transform: uppercase; color: #888; }
        .item-name { font-size: 18px; font-weight: bold; margin: 5px 0; }

     
        .preview-box {
            flex: 1.3;
            background-color: var(--preview-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .model-container {
            width: 80%;
            height: 70%;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        .model-img {
            max-width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .desc-text {
            margin-top: 25px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="header-box">
            <a href="index.html" class="back-btn">← BACK TO HOME</a>
            <h2 style="letter-spacing: 5px; color: var(--brand-navy); text-transform: uppercase; margin: 0;">Old Money Lab</h2>
            <p style="font-size: 12px; color: #666; font-style: italic;">Slide to create your combination</p>
        </div>
        
        <div class="slider-row">
            <button class="arrow" onclick="changeItem('shirt', -1)">&#10094;</button>
            <div class="item-label">
                <div class="cat-name">Top Wear</div>
                <p class="item-name" id="shirt-label">Antique White</p>
            </div>
            <button class="arrow" onclick="changeItem('shirt', 1)">&#10095;</button>
        </div>

        <div class="slider-row">
            <button class="arrow" onclick="changeItem('pants', -1)">&#10094;</button>
            <div class="item-label">
                <div class="cat-name">Bottom Wear</div>
                <p class="item-name" id="pants-label">Chocolate Espresso</p>
            </div>
            <button class="arrow" onclick="changeItem('pants', 1)">&#10095;</button>
        </div>
    </div>

    <div class="preview-box">
        <div class="model-container">
            <img class="model-img" id="model-view" src="https://images.unsplash.com/photo-1594932224828-b4b05a83296c?q=80&w=1780&auto=format&fit=crop">
        </div>
        <p class="desc-text" id="model-desc">Your Visualizations</p>
    </div>
    
    <script>
    const inventory = {
    shirts: ["Antique White", "Sky Blue Linen", "Sage Green", "Midnight Navy", "Sand Beige", "Stone Grey", "Terracotta", "Dusty Rose", "Olive Safari", "Cream Silk", "Mocha Brown", "Lavender Mist"],
    pants: [
        "Chocolate Espresso", "English Cream", "Midnight Navy", "Sandstone Beige", 
        "Slate Grey", "Earthy Terracotta", "Forest Moss", "Charcoal Black", 
        "Vintage Ivory", "Toasted Caramel", "Smoke Blue", "Oatmeal Linen"
    ]
    };
    let currentShirt = 1; 
    let currentPants = 1;

    function changeItem(type, direction) {
        if(type === 'shirt') {
            currentShirt = (currentShirt + direction);
            if(currentShirt > 12) currentShirt = 1;
            if(currentShirt < 1) currentShirt = 12;
        } else {
            currentPants = (currentPants + direction);
            if(currentPants > 12) currentPants = 1;
            if(currentPants < 1) currentPants = 12;
        }

        document.getElementById('shirt-label').innerText = inventory.shirts[currentShirt - 1];
        document.getElementById('pants-label').innerText = inventory.pants[currentPants - 1];

        
        const modelView = document.getElementById('model-view');
        
        
        const path = "images_old_money/s" + currentShirt + "_p" + currentPants + ".png";
        
        modelView.src = path;

    
        modelView.style.opacity = '0.5';
        setTimeout(() => { modelView.style.opacity = '1'; }, 200);

        console.log("Loading: " + path);
    }
    </script>
</body>
</html>
