<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPGANG CLOTHING | Home</title>
    <style>
        :root {
            --brand-navy: #001f3f;
        }
        body {
            font-family: 'Georgia', serif;
            /* Wahi light textured background jo aapne manga tha */
            background-color: #f7f6f2;
            background-image: 
                radial-gradient(at 0% 0%, rgba(220, 215, 201, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(210, 204, 185, 0.3) 0px, transparent 50%);
            background-attachment: fixed;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .brand-name {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 15px;
            margin-bottom: 60px;
            color: var(--brand-navy);
            text-transform: uppercase;
        }

        /* 3 Columns for top row as per drawing */
        .collection-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 1100px;
            width: 95%;
        }

        .collection-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none; /* Links ke niche underline hatane ke liye */
            transition: 0.4s ease;
        }

        .collection-card:hover { transform: translateY(-8px); }

        .image-box {
            width: 100%;
            aspect-ratio: 1/1; 
            background: #fff;
            border: 0.5px solid rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.03);
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .collection-card:hover img { transform: scale(1.05); }

        .collection-label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #444;
        }

        /* 2 centered boxes for bottom row */
        .bottom-row {
            grid-column: span 3;
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 10px;
        }
        .card-small { width: 31%; }

        @media (max-width: 768px) {
            .collection-container { grid-template-columns: 1fr; }
            .bottom-row { flex-direction: column; align-items: center; }
            .card-small { width: 100%; }
        }
    </style>
</head>
<body>

   
    <div class="brand-name">UPGANG CLOTHING</div>

     <div style="background-color: #ff4d4d; color: white; text-align: center; padding: 10px; font-weight: bold; letter-spacing: 1px; font-size: 0.9rem;">
    ⚠️ CURRENTLY ONLINE DELIVERY UNAVAILABLE
    </div>

    <div style="background-color: rgba(0,0,0,0.05); padding: 15px; text-align: center; border-bottom: 1px solid #ccc;">
    <p style="margin: 5px 0; font-style: italic; color: #555;">
        📍 <strong>Local Exclusive:</strong> This collection is only available locally within the city.
    </p>
    <p style="margin: 5px 0; font-weight: 500;">
        🛍️ All combinations shown here can be physically purchased at our store.
    </p>
    </div>


    <div class="collection-container">
        <a href="linen.html" class="collection-card">
            <div class="image-box">
                <img src="images/linin.webp" alt="Linen Collection">
            </div>
            <div class="collection-label">Linen</div>
        </a>

        <a href="old-money.html" class="collection-card">
            <div class="image-box">
                <img src="images/old money.webp" alt="Old Money Collection">
            </div>
            <div class="collection-label">Old Money</div>
        </a>

        <a href="casuals.html" class="collection-card">
            <div class="image-box"> 
                <img src="images/mens-casual-shirts.jpg" alt="Casuals Collection">
            </div>
            <div class="collection-label">Casuals</div>
        </a>
        
        <div class="bottom-row">
            <a href="formal.html" class="collection-card card-small">
                <div class="image-box">
                    <img src="Images/formal-attire-img-5.jpg" alt="Formal Collection">
                </div>
                <div class="collection-label">Formal</div>
            </a>
            <a href="sports.html" class="collection-card card-small">
                <div class="image-box">
                    <img src="https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg?auto=compress&w=600" alt="Gym Collection">
                </div>
                <div class="collection-label">Gym / Sports</div>
            </a>
        </div>
    </div>
    

</body>
</html>
